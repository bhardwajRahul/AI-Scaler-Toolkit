name: Feature Request
description: Suggest an idea or enhancement
title: "feat: <short description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        > The suggested title follows [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/)
        > (`feat: ...`). Adjust the type if this is not a new feature.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? Include alternatives or context if relevant.
    validations:
      required: true
